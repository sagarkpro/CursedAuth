<#macro emailBase title receiverName tmYear>
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>${title}</title>
</head>

<body style="margin:0; padding:0; background-color:#0a0a0a; color:#ededed; font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a; padding:32px 0;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0"
          style="max-width:520px; background-color:#2c2c2c; border-radius:16px; padding:32px;">
          <tr>
            <td style="text-align:center; padding-bottom:24px;">
              <div style="font-size:22px; font-weight:700; color:#fd5c63; letter-spacing:0.5px;">
                Cursed Auth
              </div>
            </td>
          </tr>
          <tr>
            <td style="font-size:16px; line-height:1.6; color:#ededed; padding-bottom:16px;">
              Hi <strong>${receiverName}</strong>,
            </td>
          </tr>
          <#nested>
          <tr>
            <td
              style="border-top:1px solid #4b4b4b; padding-top:16px; font-size:12px; color:#9a9a9a; text-align:center;">
              © ${tmYear} Cursed Auth · Built with clean code, no AI Slop
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
</#macro>
